[settings]
experimental = true

[tools]
swift = "latest"
xcodegen = "latest"
swiftlint = "latest"
swiftformat = "latest"

[tasks.generate]
description = "Generate the Xcode project"
run = "xcodegen generate"

[tasks.lint]
description = "Run SwiftLint and SwiftFormat in lint mode"
run = ["swiftlint --strict", "swiftformat --lint ."]

[tasks.format]
description = "Format Swift code with SwiftFormat"
run = "swiftformat ."

[tasks.build]
description = "Build the app"
run = ["mise run generate", "xcodebuild -scheme CaptureThis -configuration Debug -derivedDataPath .build -destination 'platform=macOS' build"]

[tasks.test]
description = "Run unit tests"
run = "xcodebuild -scheme CaptureThis -configuration Debug -derivedDataPath .build -destination 'platform=macOS' test"

[tasks.release-build]
description = "Build a release app bundle"
run = "xcodebuild -scheme CaptureThis -configuration Release -derivedDataPath .build -destination 'platform=macOS' build"

[tasks.package]
description = "Package .app.zip and .dmg"
run = "Scripts/package.sh"

[tasks.install]
description = "Build and install the app to /Applications"
run = ["mise run build", "mise run stop-remove", "mise run install-open"]

[tasks.stop-remove]
description = "Stop CaptureThis and remove the current /Applications install"
run = ["osascript -e 'quit app \"CaptureThis\"' || true", "rm -rf /Applications/CaptureThis.app"]

[tasks.wipe-local-state]
description = "Wipe local app settings, sandbox state, and granted permissions"
run = [
  "defaults delete com.capturethis.CaptureThis 2>/dev/null || true",
  "rm -rf ~/Library/Containers/com.capturethis.CaptureThis/Data 2>/dev/null || true",
  "tccutil reset ScreenCapture com.capturethis.CaptureThis || true",
  "tccutil reset Camera com.capturethis.CaptureThis || true",
  "tccutil reset Microphone com.capturethis.CaptureThis || true",
]

[tasks.install-open]
description = "Install the built Debug app to /Applications and open it"
run = ["cp -R .build/Build/Products/Debug/CaptureThis.app /Applications/", "open /Applications/CaptureThis.app"]

[tasks.install-release]
description = "Build release and install the app to /Applications"
run = ["mise run release-build", "cp -R .build/Build/Products/Release/CaptureThis.app /Applications/", "open /Applications/CaptureThis.app"]

[tasks.fresh-install]
description = "Build, wipe local app state and permissions, then install to /Applications"
run = ["mise run build", "mise run stop-remove", "mise run wipe-local-state", "mise run install-open"]

[tasks.build-cli]
description = "Build the CLI tool"
run = "xcodebuild -scheme CaptureThisCLI -configuration Debug -derivedDataPath .build -destination 'platform=macOS' build"

[tasks.test-core]
description = "Run CaptureThisCore unit tests"
run = "xcodebuild -scheme CaptureThisCore -configuration Debug -derivedDataPath .build -destination 'platform=macOS' test"

[tasks.ci]
description = "Generate project, lint, build all targets, run all tests"
run = ["mise run generate", "mise run lint", "mise run build", "mise run build-cli", "mise run test", "mise run test-core"]
