name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Release version without the leading v, for example 0.1.0"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup mise
        uses: jdx/mise-action@v2
        with:
          cache: true

      - name: Enable mise experimental
        run: mise settings experimental=true

      - name: Install tools
        run: mise install

      - name: Install signing assets
        env:
          MACOS_DEV_CERT_P12_B64: ${{ secrets.MACOS_DEV_CERT_P12_B64 }}
          MACOS_DEV_CERT_PASSWORD: ${{ secrets.MACOS_DEV_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [[ -z "$MACOS_DEV_CERT_P12_B64" || -z "$MACOS_DEV_CERT_PASSWORD" || -z "$KEYCHAIN_PASSWORD" ]]; then
            echo "Signing secrets are missing. Set MACOS_DEV_CERT_P12_B64, MACOS_DEV_CERT_PASSWORD, and KEYCHAIN_PASSWORD." >&2
            exit 1
          fi

          echo "$MACOS_DEV_CERT_P12_B64" | base64 --decode > /tmp/dev_cert.p12

          security create-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security list-keychains -d user -s build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" build.keychain
          security set-keychain-settings -lut 21600 build.keychain
          security import /tmp/dev_cert.p12 -k build.keychain -P "$MACOS_DEV_CERT_PASSWORD" -T /usr/bin/codesign -T /usr/bin/xcodebuild -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" build.keychain

          if [[ -n "${MACOS_DEV_PROFILE_B64:-}" ]]; then
            echo "$MACOS_DEV_PROFILE_B64" | base64 --decode > /tmp/dev_profile.provisionprofile
            mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
            cp /tmp/dev_profile.provisionprofile ~/Library/MobileDevice/Provisioning\ Profiles/
          fi

      - name: Generate project
        run: mise run generate

      - name: Lint
        run: mise run lint

      - name: Test
        run: mise run test

      - name: Build release
        run: mise run release-build

      - name: Package artifacts
        run: mise run package

      - name: Set release metadata
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            version="${{ inputs.version }}"
            release_tag="v${version}"
          else
            release_tag="${GITHUB_REF_NAME}"
            version="${release_tag#v}"
          fi

          if [[ ! "$version" =~ ^[0-9]+(\.[0-9]+)*([_-][A-Za-z0-9.-]+)?$ ]]; then
            echo "Invalid release version: $version" >&2
            exit 1
          fi

          dmg_sha256="$(shasum -a 256 artifacts/CaptureThis.dmg | awk '{print $1}')"

          {
            echo "RELEASE_VERSION=$version"
            echo "RELEASE_TAG=$release_tag"
            echo "DMG_SHA256=$dmg_sha256"
          } >> "$GITHUB_ENV"

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.RELEASE_TAG }}
          name: ${{ env.RELEASE_TAG }}
          generate_release_notes: true
          files: |
            artifacts/CaptureThis.app.zip
            artifacts/CaptureThis.dmg

      - name: Create Homebrew tap token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          client-id: ${{ vars.HOMEBREW_TAP_APP_CLIENT_ID }}
          private-key: ${{ secrets.HOMEBREW_TAP_APP_PRIVATE_KEY }}
          owner: meck93
          repositories: homebrew-tap

      - name: Update Homebrew tap
        env:
          TAP_GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          RELEASE_VERSION: ${{ env.RELEASE_VERSION }}
          DMG_SHA256: ${{ env.DMG_SHA256 }}
        run: |
          if [[ -z "$TAP_GITHUB_TOKEN" ]]; then
            echo "Homebrew tap installation token is missing. Check HOMEBREW_TAP_APP_CLIENT_ID and HOMEBREW_TAP_APP_PRIVATE_KEY." >&2
            exit 1
          fi

          tap_dir="$(mktemp -d)"
          git clone "https://x-access-token:${TAP_GITHUB_TOKEN}@github.com/meck93/homebrew-tap.git" "$tap_dir"

          mkdir -p "$tap_dir/Casks"
          cp Casks/capture-this.rb "$tap_dir/Casks/capture-this.rb"

          ruby -pi -e 'gsub(/version "[^"]+"/, "version \"#{ENV.fetch("RELEASE_VERSION")}\"")' "$tap_dir/Casks/capture-this.rb"
          ruby -pi -e 'gsub(/sha256 "[^"]+"/, "sha256 \"#{ENV.fetch("DMG_SHA256")}\"")' "$tap_dir/Casks/capture-this.rb"

          cd "$tap_dir"
          brew audit --cask --new capture-this

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Casks/capture-this.rb

          if git diff --cached --quiet; then
            echo "Homebrew tap already up to date."
            exit 0
          fi

          git commit -m "chore: update CaptureThis to ${RELEASE_VERSION}"
          git push
